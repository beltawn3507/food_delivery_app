name: payment-ci
run-name: payment-ci workflow in github actions

on:
  push:
    branches: [main]
    paths:
      - "utils/**"
  pull_request:
    branches: [main]
    paths:
      - "utils/**"

jobs:
  build-and-push-payment:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR 
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{github.repository_owner}}
          password: ${{secrets.GITHUB_TOKEN}}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push payment image
        uses: docker/build-push-action@v5
        with:
          context: payment
          file: utils/Dockerfile
          push: true
          tags: |
            ghcr.io/${{github.repository_owner}}/food_payment:${{github.sha}}


