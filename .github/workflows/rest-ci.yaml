name: rest-ci
run-name: rest-ci workflow in github actions

on:
  push:
    branches: [main]
    paths:
      - "restaurant/**"
  pull_request:
    branches: [main]
    paths:
      - "restaurant/**"

jobs:
  build-and-push-rest:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR 
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{github.repository_owner}}
          password: ${{secrets.CR_PAT}}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push rest image
        uses: docker/build-push-action@v5
        with:
          context: rest
          file: restaurant/Dockerfile
          push: true
          tags: |
            ghcr.io/${{github.repository_owner}}/food_rest:${{github.sha}}


