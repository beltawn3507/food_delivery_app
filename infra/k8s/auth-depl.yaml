apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-depl
  namespace: food
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: beltawn3507/food_auth
          envFrom:
            - secretRef:
                name: auth-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata: 
  name: auth-srv
  namespace: food
spec:
  selector:
    app: auth
  ports:
    - name: auth
      protocol: TCP
      port: 5000
      targetPort: 5000


